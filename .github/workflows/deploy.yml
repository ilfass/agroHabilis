name: Deploy AgroHabilis

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar SSH para deploy
        run: |
          mkdir -p ~/.ssh
          KEY='${{ secrets.VPS_SSH_KEY }}'
          if printf '%s' "$KEY" | grep -q '\\n'; then
            printf '%b' "$KEY" > ~/.ssh/id_deploy
          else
            printf '%s' "$KEY" > ~/.ssh/id_deploy
          fi
          sed -i 's/\r$//' ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sincronizar codigo a VPS
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude ".env" \
            -e "ssh -i ~/.ssh/id_deploy" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/agro.habilispro.com/"

      - name: Reiniciar app en VPS
        run: |
          ssh -i ~/.ssh/id_deploy "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            cd /var/www/agro.habilispro.com
            npm ci --omit=dev
            pm2 restart agrohabilis --update-env || pm2 start src/index.js --name agrohabilis
            pm2 save
          '
